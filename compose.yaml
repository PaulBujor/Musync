services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: musync
      POSTGRES_PASSWORD: musync
      POSTGRES_DB: musync
    ports:
      - "5432:5432"
    volumes:
      - ./Data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musync -d musync"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:9
    ports:
      - "6379:6379"
    volumes:
      - ./Data/valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5


