services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: spotifytools
      POSTGRES_PASSWORD: spotifytools
      POSTGRES_DB: spotifytools
    ports:
      - "5432:5432"
    volumes:
      - ./Data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotifytools -d spotifytools"]
      interval: 5s
      timeout: 5s
      retries: 5

  spotifytools:
    image: spotifytools
    build:
      context: .
      dockerfile: src/SpotifyTools/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Database=spotifytools;Username=spotifytools;Password=spotifytools"


