services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: musync
      POSTGRES_PASSWORD: musync
      POSTGRES_DB: musync
    ports:
      - "5432:5432"
    volumes:
      - ./Data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musync -d musync"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    volumes:
      - ./Data/valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  musync:
    image: musync
    build:
      context: .
      dockerfile: src/Musync/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Database=musync;Username=musync;Password=musync"
      ConnectionStrings__Valkey: "valkey:6379"

